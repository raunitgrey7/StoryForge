services:
  - type: web
    name: storyforge
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn --app-dir backend app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: GOOGLE_API_KEY_1
        sync: false
      - key: GOOGLE_API_KEY_2
        sync: false
      - key: GOOGLE_API_KEY_3
        sync: false
      - key: GOOGLE_API_KEY_4
        sync: false
      - key: GOOGLE_API_KEY_5
        sync: false
